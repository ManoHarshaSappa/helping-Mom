<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#8b2500" />
  <title>హరికథా Content Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fdf6ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: linear-gradient(135deg, #8b2500, #c06000);
      color: #fff;
      text-align: center;
      padding: 20px 16px 16px;
    }
    header h1 { font-size: clamp(20px, 5vw, 26px); letter-spacing: 0.5px; }
    header p  { margin-top: 6px; font-size: clamp(12px, 3.5vw, 14px); opacity: 0.88; }

    /* ── Mode switcher ── */
    .mode-switcher {
      display: flex;
      width: 100%;
      max-width: 900px;
      margin: 14px auto 0;
      padding: 0 16px;
      gap: 10px;
    }
    .mode-btn {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      border: 2px solid #e8c99a;
      border-radius: 10px;
      background: #fff;
      color: #8b2500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .mode-btn.active {
      background: #8b2500;
      color: #fff;
      border-color: #8b2500;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Mode sections ── */
    .mode-section { display: none; flex-direction: column; gap: 14px; }
    .mode-section.active { display: flex; }

    /* ── Mobile tabs ── */
    .tabs {
      display: none;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #e8c99a;
    }
    .tabs button {
      flex: 1;
      padding: 12px 8px;
      font-size: 14px;
      font-weight: 600;
      background: #fff;
      color: #8b2500;
      border: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tabs button.active { background: #8b2500; color: #fff; }

    .boxes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .panel { display: flex; flex-direction: column; gap: 8px; }

    .box-label {
      font-size: 13px;
      font-weight: 700;
      color: #8b2500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      border: 2px solid #e8c99a;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      line-height: 1.65;
      resize: none;
      outline: none;
      font-family: inherit;
      background: #fffdf8;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: #c06000; }
    textarea[readonly] { background: #f7f7f7; color: #222; }

    .fb-input   { height: 240px; }
    .yt-title   { height: 70px; }
    .yt-context { height: 160px; }
    .yt-output  { height: 400px; }

    .actions { display: flex; gap: 10px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    button:active { transform: scale(0.96); }

    .btn-generate {
      flex: 1;
      padding: 15px 12px;
      background: #c06000;
      color: #fff;
    }
    .btn-generate:hover    { background: #a04e00; }
    .btn-generate:disabled { background: #d4a06a; cursor: not-allowed; }

    .btn-copy {
      padding: 15px 18px;
      background: #e8f5e9;
      color: #2e7d32;
      border: 2px solid #a5d6a7;
    }
    .btn-copy:hover   { background: #c8e6c9; }
    .btn-copy.copied  { background: #c8e6c9; color: #1b5e20; }

    .btn-clear {
      padding: 15px 18px;
      background: #fce4ec;
      color: #880e4f;
      border: 2px solid #f48fb1;
    }
    .btn-clear:hover { background: #f8bbd0; }

    .status {
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }
    .status.error   { color: #c62828; }
    .status.ok      { color: #2e7d32; }
    .status.loading { color: #c06000; }

    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid #c06000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .yt-inputs { display: flex; flex-direction: column; gap: 8px; }

    @media (max-width: 640px) {
      .tabs  { display: flex; }
      .boxes { grid-template-columns: 1fr; }
      .panel { display: none; }
      .panel.active { display: flex; }
      textarea { height: 52vw; min-height: 160px; }
      .yt-output { height: 60vw; min-height: 240px; }
      .actions { flex-wrap: wrap; }
      .btn-generate { order: -1; width: 100%; flex: none; }
      .btn-copy, .btn-clear { flex: 1; }
      .mode-switcher { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎵 హరికథా Content Generator</h1>
  <p>Facebook Post & YouTube Description Generator</p>
</header>

<!-- Mode switcher -->
<div class="mode-switcher">
  <button class="mode-btn active" onclick="switchMode('facebook')">📘 Facebook Post</button>
  <button class="mode-btn"        onclick="switchMode('youtube')">▶️ YouTube Description</button>
</div>

<div class="container">

  <!-- ══════════════ FACEBOOK MODE ══════════════ -->
  <div class="mode-section active" id="mode-facebook">

    <div class="tabs">
      <button id="fb-tab-input"  class="active" onclick="switchTab('fb','input')">📝 Input</button>
      <button id="fb-tab-output" onclick="switchTab('fb','output')">✨ Generated Post</button>
    </div>

    <div class="boxes">
      <div class="panel active" id="fb-panel-input">
        <div class="box-label">📝 మీ Performance Description</div>
        <textarea id="fb-input" class="fb-input"
          placeholder="ఇక్కడ మీ performance గురించి Telugu లో రాయండి...

Example:
29/4/2026, ఏలూరు జిల్లా, వడలి గ్రామంలో శ్రీ జగన్నాథ స్వామి కళ్యాణ మహోత్సవంలో జరిగిన నా హరికథ చిత్రావళి."></textarea>
        <div class="actions">
          <button class="btn-clear" onclick="clearFb()">🗑 Clear</button>
          <button class="btn-generate" id="fb-btn-gen" onclick="generateFb()">✨ Generate Post</button>
        </div>
      </div>

      <div class="panel active" id="fb-panel-output">
        <div class="box-label">✨ Generated Post</div>
        <textarea id="fb-output" class="fb-input" readonly placeholder="Generate నొక్కిన తర్వాత ఇక్కడ post వస్తుంది..."></textarea>
        <div class="actions">
          <button class="btn-copy" id="fb-btn-copy" onclick="copyText('fb-output','fb-btn-copy','📋 Copy Post')">📋 Copy Post</button>
        </div>
      </div>
    </div>

    <div class="status" id="fb-status"></div>
  </div>

  <!-- ══════════════ YOUTUBE MODE ══════════════ -->
  <div class="mode-section" id="mode-youtube">

    <div class="tabs">
      <button id="yt-tab-input"  class="active" onclick="switchTab('yt','input')">📝 Input</button>
      <button id="yt-tab-output" onclick="switchTab('yt','output')">▶️ Description</button>
    </div>

    <div class="boxes">
      <div class="panel active" id="yt-panel-input">
        <div class="yt-inputs">
          <div class="box-label">▶️ Video Title</div>
          <textarea id="yt-title" class="yt-title" placeholder="Example: దశరథ పుత్రకామేష్టి యజ్ఞ ఫలం హరికథ – శ్రీరామ జన్మ వైభవం"></textarea>

          <div class="box-label" style="margin-top:6px">📝 Extra Details (optional)</div>
          <textarea id="yt-context" class="yt-context" placeholder="Example: This video was recorded at Vijayawada. It covers the story of Dasaratha's yagna and Sri Rama's birth..."></textarea>
        </div>
        <div class="actions" style="margin-top:8px">
          <button class="btn-clear" onclick="clearYt()">🗑 Clear</button>
          <button class="btn-generate" id="yt-btn-gen" onclick="generateYt()">▶️ Generate Description</button>
        </div>
      </div>

      <div class="panel active" id="yt-panel-output">
        <div class="box-label">▶️ YouTube Description</div>
        <textarea id="yt-output" class="yt-output" readonly placeholder="Generate నొక్కిన తర్వాత ఇక్కడ YouTube description వస్తుంది..."></textarea>
        <div class="actions">
          <button class="btn-copy" id="yt-btn-copy" onclick="copyText('yt-output','yt-btn-copy','📋 Copy Description')">📋 Copy Description</button>
        </div>
      </div>
    </div>

    <div class="status" id="yt-status"></div>
  </div>

</div><!-- /container -->

<script>
  // ── Mode switch ──
  function switchMode(mode) {
    document.querySelectorAll('.mode-btn').forEach((b,i) =>
      b.classList.toggle('active', (i===0 && mode==='facebook') || (i===1 && mode==='youtube'))
    );
    document.getElementById('mode-facebook').classList.toggle('active', mode==='facebook');
    document.getElementById('mode-youtube').classList.toggle('active', mode==='youtube');
  }

  // ── Mobile tab switch ──
  function switchTab(prefix, tab) {
    const isMobile = window.innerWidth <= 640;
    document.getElementById(`${prefix}-tab-input`).classList.toggle('active', tab==='input');
    document.getElementById(`${prefix}-tab-output`).classList.toggle('active', tab==='output');
    if (isMobile) {
      document.getElementById(`${prefix}-panel-input`).classList.toggle('active', tab==='input');
      document.getElementById(`${prefix}-panel-output`).classList.toggle('active', tab==='output');
    }
  }

  window.addEventListener('resize', () => {
    if (window.innerWidth > 640) {
      ['fb','yt'].forEach(p => {
        document.getElementById(`${p}-panel-input`).classList.add('active');
        document.getElementById(`${p}-panel-output`).classList.add('active');
      });
    }
  });

  function setStatus(id, msg, type='') {
    const el = document.getElementById(id);
    el.innerHTML = msg;
    el.className = 'status ' + type;
  }

  // ── Copy helper ──
  function copyText(textareaId, btnId, resetLabel) {
    const val = document.getElementById(textareaId).value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.getElementById(btnId);
      btn.textContent = '✅ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = resetLabel; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── Facebook generate ──
  async function generateFb() {
    const text = document.getElementById('fb-input').value.trim();
    if (!text) { setStatus('fb-status','⚠️ Performance description రాయండి.','error'); return; }

    const btn = document.getElementById('fb-btn-gen');
    btn.disabled = true; btn.textContent = 'Generating…';
    setStatus('fb-status','<span class="spinner"></span> Generating post…','loading');
    document.getElementById('fb-output').value = '';

    try {
      const res  = await fetch('/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({text}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Unknown error');
      document.getElementById('fb-output').value = data.post;
      setStatus('fb-status','✅ Post ready! Copy చేయండి.','ok');
      if (window.innerWidth <= 640) switchTab('fb','output');
    } catch(err) {
      setStatus('fb-status','❌ Error: '+err.message,'error');
    } finally {
      btn.disabled = false; btn.textContent = '✨ Generate Post';
    }
  }

  function clearFb() {
    document.getElementById('fb-input').value = '';
    document.getElementById('fb-output').value = '';
    setStatus('fb-status','');
    if (window.innerWidth <= 640) switchTab('fb','input');
  }

  // ── YouTube generate ──
  async function generateYt() {
    const title   = document.getElementById('yt-title').value.trim();
    const context = document.getElementById('yt-context').value.trim();
    if (!title) { setStatus('yt-status','⚠️ Video title రాయండి.','error'); return; }

    const btn = document.getElementById('yt-btn-gen');
    btn.disabled = true; btn.textContent = 'Generating…';
    setStatus('yt-status','<span class="spinner"></span> Generating description…','loading');
    document.getElementById('yt-output').value = '';

    try {
      const res  = await fetch('/generate-youtube', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({title, context}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Unknown error');
      document.getElementById('yt-output').value = data.description;
      setStatus('yt-status','✅ Description ready! Copy చేయండి.','ok');
      if (window.innerWidth <= 640) switchTab('yt','output');
    } catch(err) {
      setStatus('yt-status','❌ Error: '+err.message,'error');
    } finally {
      btn.disabled = false; btn.textContent = '▶️ Generate Description';
    }
  }

  function clearYt() {
    document.getElementById('yt-title').value = '';
    document.getElementById('yt-context').value = '';
    document.getElementById('yt-output').value = '';
    setStatus('yt-status','');
    if (window.innerWidth <= 640) switchTab('yt','input');
  }

  // Ctrl+Enter shortcuts
  document.getElementById('fb-input').addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') generateFb(); });
  document.getElementById('yt-title').addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') generateYt(); });
  document.getElementById('yt-context').addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey)&&e.key==='Enter') generateYt(); });
</script>
</body>
</html>
